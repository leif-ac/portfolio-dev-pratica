<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Portfólio Dev</title>

    <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&family=Inconsolata:wght@200..900&family=Maven+Pro:wght@400..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="intro" hidden>
       
    </section>
    
    <section id="project" hidden>
        <header>
            <h3>Meu Trabalho</h3>
            <h2>Veja os projetos em destaque</h2>
        </header>

        <main>
            <figure class="card">
                <img src="assets/image/Thumbnail_Project-01.png" alt="Projeto Travelgram">
                <figcaption>
                    <h4>Websites e Aplicativos</h4>
                    <p>Desenvolvimento de interfaces</p>
                </figcaption>
            </figure>

            <figure class="card">
                <img src="assets/image/Thumbnail_Project-02.png" alt="Tech News">
                <figcaption>
                    <h4>Tech News</h4>
                    <p>Homepage de um portal de notícias sobre a área de tecnologia</p>
                </figcaption>
            </figure>
            
            <figure class="card">
                <img src="assets/image/Thumbnail_Project-03.png" alt="Página de Receita">
                <figcaption>
                    <h4>Página de receita</h4>
                    <p>Página com o passo a passo de uma receita para cupcakes</p>
                </figcaption>
            </figure>

            <figure class="card">
                <img src="assets/image/Thumbnail_Project-04.png" alt="Zingen">
                <figcaption>
                    <h4>Zingen</h4>
                    <p>Landing Page completa e responsiva de um aplicativo de Karaokê</p>
                </figcaption>
            </figure>

            <figure class="card">
                <img src="assets/image/Thumbnail_Project-05.png" alt="Refund">
                <figcaption>
                    <h4>Refund</h4>
                    <p>Um sistema para pedido e acompanhamento de reembolso</p>
                </figcaption>
            </figure>

            <figure class="card">
                <img src="assets/image/Thumbnail_Project-06.png" alt="Página de Turismo">
                <figcaption>
                    <h4>Página de turismo</h4>
                    <p>Página com as principais informações para quem quer viajar para Busan</p>
                </figcaption>
            </figure>
        </main>
    </section>

    <section id="service">

    </section>

    <section id="contact">
        
    </section>

</html>
